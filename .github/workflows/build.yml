name: Build Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup QPM
        uses: sc2ad/setup-qpm@v0.1.1
        with:
          qpm-version: 0.1.0

      - name: QPM Restore
        run: qpm restore

      - name: Build
        run: cd build && cmake .. && make
