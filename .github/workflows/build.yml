name: Build Vivify2 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install QPM
        run: |
          # Use a direct link to the known working version
          wget https://github.com/QuestPackageManager/QPM.CLI/releases/download/v0.1.20/qpm-linux-x64
          chmod +x qpm-linux-x64
          sudo mv qpm-linux-x64 /usr/local/bin/qpm
          qpm --version

      - name: QPM Restore
        # We pass the secret token so QPM can access dependencies
        env:
          QPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          qpm collect
          qpm restore

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build Project
        run: |
          cmake -S . -B build -DANDROID_ABI=arm64-v8a
          cmake --build build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify2-Mod
          path: build/*.qmod
