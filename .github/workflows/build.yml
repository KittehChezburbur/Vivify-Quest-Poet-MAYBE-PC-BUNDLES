name: Build Vivify2 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find and Build
        run: |
          # Automatically find the directory containing CMakeLists.txt
          SOURCE_DIR=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          
          if [ -z "$SOURCE_DIR" ]; then
            echo "Error: CMakeLists.txt not found!"
            exit 1
          fi
          
          echo "Found CMakeLists.txt in: $SOURCE_DIR"
          
          # Build using the discovered directory
          cmake -S "$SOURCE_DIR" -B build -DANDROID_ABI=arm64-v8a
          cmake --build build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify2-Mod
          path: build/*.qmod
