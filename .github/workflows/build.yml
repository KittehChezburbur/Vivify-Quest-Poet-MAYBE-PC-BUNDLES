name: Build Vivify2 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install QPM
        run: |
          # Query GitHub API to get the latest QPM CLI download URL
          LATEST_URL=$(curl -s https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/latest | grep "browser_download_url" | grep "qpm-linux-x64" | cut -d '"' -f 4)
          echo "Downloading QPM from: $LATEST_URL"
          wget -q $LATEST_URL -O qpm
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm
          qpm --version

      - name: QPM Restore
        env:
          QPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          qpm collect
          qpm restore

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build Project
        run: |
          cmake -S . -B build -DANDROID_ABI=arm64-v8a
          cmake --build build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify2-Mod
          path: build/*.qmod
