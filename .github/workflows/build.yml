name: Build Vivify2 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install QPM
        run: |
          # Download the latest QPM CLI binary
          curl -L https://github.com/QuestPackageManager/QPM.CLI/releases/latest/download/qpm-linux-x64 -o qpm
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm
          qpm --version

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: QPM Restore
        run: qpm restore

      - name: Build Project
        run: |
          cmake -S . -B build -DANDROID_ABI=arm64-v8a
          cmake --build build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify2-Mod
          path: build/*.qmod
