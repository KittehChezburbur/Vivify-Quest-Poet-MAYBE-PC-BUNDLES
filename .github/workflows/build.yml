name: Build Vivify2 Mod

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup QPM
        uses: Fernthedev/qpm-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.1.20

      - name: QPM Restore
        run: qpm restore

      - name: Build Project
        run: |
          cmake -S . -B build -DANDROID_ABI=arm64-v8a
          cmake --build build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivify2-Mod
          path: build/*.qmod
